# ============================================================
#  tmux.conf — Catppuccin Mocha | Kitty | Meta+A | Fedora
# ============================================================

# --- Shell ---
set-option -g default-shell /usr/bin/fish

# --- Kitty & True Colour support ---
set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-kitty:Tc"
set -as terminal-overrides ",*:RGB"

# --- Prefix: Alt + a ---
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# --- General Settings ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on

# --- Terminal Title ---
set -g set-titles on
set -g set-titles-string "#T"

# --- Status Bar Appearance ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-right-length 120

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.2' # Ensure you use a stable version
set -g @plugin 'tmux-plugins/tmux-yank'

# --- Catppuccin Config ---
set -g mouse on

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"


# --- Key Bindings ---
# FIX: Points to your actual config path
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane Movement (Vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Windows
bind c new-window -c "#{pane_current_path}"

# --- Initialize TPM (Keep this at the very bottom) ---
# Check if TPM is installed, if not, this will just do nothing 
run '~/.tmux/plugins/tpm/tpm'
