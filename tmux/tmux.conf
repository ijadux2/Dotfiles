# ============================================================
#  tmux.conf — Catppuccin Mocha | Kitty | Meta+A | Zsh
#  Requires: TPM  https://github.com/tmux-plugins/tpm
#  Install :  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#  Then inside tmux: prefix + I  to install plugins
# ============================================================

# -----------------------------------------------------------
# Shell
# -----------------------------------------------------------
#set -g default-shell /bin/fish
set-option -g default-shell /usr/bin/fish

# -----------------------------------------------------------
# True colour + kitty support
# -----------------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# -----------------------------------------------------------
# Prefix — Meta (Alt) + a
# -----------------------------------------------------------
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# -----------------------------------------------------------
# General settings
# -----------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
setw -g aggressive-resize on

# -----------------------------------------------------------
# Catppuccin Mocha palette (reference)
# -----------------------------------------------------------
# Base      #1e1e2e  Mantle    #181825  Crust     #11111b
# Surface0  #313244  Surface1  #45475a  Overlay0  #6c7086
# Text      #cdd6f4  Lavender  #b4befe  Blue      #89b4fa
# Sapphire  #74c7ec  Sky       #89dceb  Teal      #94e2d5
# Green     #a6e3a1  Yellow    #f9e2af  Peach     #fab387
# Red       #f38ba8  Mauve     #cba6f7  Pink      #f5c2e7

# -----------------------------------------------------------
# Message / command line
# -----------------------------------------------------------
set -g message-style         "fg=#cdd6f4,bg=#313244,bold"
set -g message-command-style "fg=#f9e2af,bg=#313244,bold"

# -----------------------------------------------------------
# Mode (copy/visual) highlight
# -----------------------------------------------------------
setw -g mode-style "fg=#1e1e2e,bg=#cba6f7,bold"

# -----------------------------------------------------------
# Status bar — global
# -----------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length  120
set -g status-right-length 120

# -----------------------------------------------------------
# ██  CATPPUCCIN PLUGIN OPTIONS  ██
# These are read by the plugin after it loads (below).
# -----------------------------------------------------------

# ~/.tmux.conf

# Options to make tmux more pleasant
set -g mouse on

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"



# -----------------------------------------------------------
# Clock in status-left (12-hour) — sits before plugin windows
# The plugin owns status-right; we use status-left for clock.
# -----------------------------------------------------------
set -g status-left \
  "#[fg=#f9e2af,bg=#313244,bold]  %I:%M %p #[fg=#313244,bg=#1e1e2e] "

# -----------------------------------------------------------
# TPM plugins
# -----------------------------------------------------------
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "catppuccin/tmux"
set -g @plugin "tmux-plugins/tmux-yank"

# -----------------------------------------------------------
# Key bindings
# -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -----------------------------------------------------------
# Clock mode (prefix + t)
# -----------------------------------------------------------
set -g clock-mode-colour "#89b4fa"
set -g clock-mode-style  12

# -----------------------------------------------------------
# Bootstrap TPM — MUST be the very last line
# -----------------------------------------------------------
run-shell "~/.tmux/plugins/tpm/tpm"

# ============================================================
